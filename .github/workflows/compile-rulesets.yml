name: Build Mihomo Rule Sets

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  build:
    name: Compile rule-sets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y zip wget

          wget -O /tmp/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64

          chmod +x /tmp/yq
          sudo mv /tmp/yq /usr/local/bin/yq

      - name: Install Mihomo
        run: |
          VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r .tag_name)

          wget \
            https://github.com/MetaCubeX/mihomo/releases/download/${VERSION}/mihomo-linux-amd64-${VERSION}.gz \
            -O mihomo.gz

          gunzip mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo

      - name: Compile rule sets
        run: |
          chmod +x rule-sets/compile.sh
          ./rule-sets/compile.sh

      - name: Generate release name
        id: release
        run: |
          NAME=$(openssl rand -hex 8)

          echo "name=$NAME" >> $GITHUB_OUTPUT

          echo "Release name: $NAME"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.name }}
          name: ${{ steps.release.outputs.name }}
          files: |
            rule-sets.zip
